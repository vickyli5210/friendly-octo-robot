# GitHub Actions Expressions Example
#
# Expression Syntax Notes:
# - The expression ${{inputs.debug && 'true' || 'false'}} demonstrates a ternary-like pattern
# - Uses JavaScript-style logical operators with short-circuit evaluation:
#   * When inputs.debug is truthy (true), && returns 'true'
#   * When inputs.debug is falsy (false/null/empty), && short-circuits and || returns 'false'
# - This mimics the ternary operator: condition ? 'true' : 'false'
# - Ensures run-name always displays a clear string value for better UI readability
# - GitHub Actions also supports explicit ternary syntax: ${{ inputs.debug ? 'true' : 'false' }}

name: 07-Using Expressions
run-name: 07-Using Expressions | DEBUG - ${{inputs.debug && 'true' || 'false'}}
env:
    MY_VARIABLE: ${{vars.MY_VARIABLE || 'default value if undefined'}}
on:
    push:
    workflow_dispatch:
        inputs:
            debug:
                description: 'Enable debug mode'
                default: false
                type: boolean
jobs:
    use-expressions:
        runs-on: ubuntu-latest
        steps:
            - name: "[debug] Print Start-up"
            #if condition already implies expression usage
              if: inputs.debug == true 
              run: |
                    echo "Debug mode is triggered by: ${{github.event_name}}
                    echo "Branch: ${{ github.branch }}"
                    echo "Commit SHA: ${{ github.sha }}
                    echo "Runner OS: ${{ runner.os &&runner.name}} "
            - name: "[debug] Print when triggered from main"
              if: ${{ inputs.debug == true && github.ref == 'refs/heads/main' }}
              run: echo "This run was triggered from the main branch."
            - name: "Always Run Step"
              run: echo "This step runs regardless of debug mode or branch."