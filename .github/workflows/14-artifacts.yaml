name: 14- Working wiht Artifacts

on:
    workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 14-Artifacts/react-app
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                    node-version: '20.x'
            - name: download cache dependencies
              id: cache
              uses: actions/cache@v3
              with:
                # Check if cache is hit or miss; also validates the path directory
                path: 14-Artifacts/react-app/node_modules
                key: deps-node-modules-${{ hashFiles('14-Artifacts/react-app/package-lock.json') }}
            - name: Install Dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci
            - name: Unit tests
              run: npm run test 
            - name: Build
              run: npm run build
            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: react-app-build
                  path: 14-Artifacts/react-app/build

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Download Build Artifacts
              uses: actions/download-artifact@v4
              with:
                  name: react-app-build
                  path: build
                #   path: 14-Artifacts/react-app/build
            - name: Show folder structure
              run: ls -R build
            #   run: ls -R 14-Artifacts/react-app/build