# GitHub Actions Context Example
# 
# This workflow demonstrates different ways to define and access variables:
# 
# 1. Workflow-level env variables (line 12-13):
#    - Defined with 'env:' at the top level
#    - Available to ALL jobs and steps in the workflow
#    - Access with: ${{ env.VARIABLE_NAME }}
# 
# 2. Job-level env variables (line 18-19, commented):
#    - Defined with 'env:' under a specific job
#    - Only available to that job's steps
#    - Overrides workflow-level variables with the same name
# 
# 3. Step-level env variables (line 36-37, commented):
#    - Defined with 'env:' under a specific step
#    - Only available to that single step
#    - Overrides job-level and workflow-level variables with the same name
# 
# 4. GitHub Environment Variables (accessed via vars context):
#    - Defined in GitHub Settings → Environments → [Environment Name] → Variables
#    - Requires 'environment:' key at job level to access
#    - Access with: ${{ vars.VARIABLE_NAME }}
# 
# Variable precedence (highest to lowest): Step > Job > Workflow
#
# Shell Variable Access:
# - Variables from 'env:' blocks are automatically exported as shell variables
#   Access with: $VARIABLE_NAME (no need for ${{ }})
# - Default GitHub Actions environment variables (e.g., $GITHUB_WORKSPACE, $GITHUB_SHA)
#   Access with: $VARIABLE_NAME
# - GitHub contexts (vars, secrets, inputs, github) MUST use ${{ }} syntax
#   e.g., ${{ vars.MY_VAR }}, ${{ secrets.API_KEY }}, ${{ github.repository }}
# - To use context values as shell variables, export them via env:
#   Example:
#     env:
#       REPO_VAR: ${{ vars.MY_VARIABLE }}
#     run: echo "Use as: $REPO_VAR"

name: 06-contexts
run-name: 06-Contexts | DEBUG - ${{inputs.DEBUG}}
on:
    push:
    workflow_dispatch:
        inputs:
            DEBUG:
                description: 'Enable debug mode'
                default: false
                type: boolean
env:
    MY_VARIABLE: "jolin global"  
jobs:
    echo-data: # Job name/ ID to display GitHub context data
        runs-on: ubuntu-latest
        environment: GitHub actions course  # Use the environment
        # env: // Job-level environment variable (uncomment to override workflow-level)
        #     MY_VARIABLE: "JOLIN NANNING"  # This overrides the environment variable
        steps:
            - name: Display Information and Show GitHub Context Data
              run: |
                echo "Event Name: ${{ github.event_name }}"
                echo "Repository: ${{ github.repository }}"
                echo "Workflow: ${{ github.workflow }}"
                echo "Actor/Author: ${{ github.actor }}"
                echo "Ref: ${{ github.ref }}"
                echo "SHA: ${{ github.sha }}"
                echo "Run ID: ${{ github.run_id }}"
                echo "Run Number: ${{ github.run_number }}"
            - name: Retrieve Environment Variable from GitHub Settings
              run: |
                  ## The variable should be defined in the "GitHub actions course" environment in Settings
                  echo "The value of vars.MY_VARIABLE is: ${{ vars.MY_VARIABLE }}"
            - name: Print Workflow-Level Environment Variable
            #   env:
            #         MY_VARIABLE: "Jolin Override Env Variable at Step Level"  # Pass the workflow-level env variable to the step
              run: |
                  ## This reads from the env: block at the workflow level
                  echo "The value of env.MY_VARIABLE is: ${{ env.MY_VARIABLE }}"
    echo-data-as-shell-variable:
        runs-on: ubuntu-latest
        environment: GitHub actions course  # Use the environment

        steps:
            - name: Print Environment Variable as Shell Variable
              run: |
                  ## env variables are automatically exported to the shell
                  echo "The value of MY_VARIABLE (from env) is: $MY_VARIABLE"
                  ## vars context must use GitHub Actions expression syntax
                  echo "The value of MY_VARIABLE (from GitHub Environment vars) is: ${{ vars.MY_VARIABLE }}"