name: 15-working with matrices
on:
    workflow_dispatch

jobs:
    backwards-compatability:
        name: Test on Node.js ${{ matrix.node-version }} on OS ${{ matrix.OS }}
        runs-on: ${{ matrix.OS }}
        strategy:
            # When it is false, it keeps running all matrix jobs even if one combination fails.
            fail-fast: false
            matrix:
                # within matrix, if one job failed, the others will be skipped or marked as failed, depending on the configuration; also we can specify the max number of parallel jobs to run
                node-version: [18.x, 22.x, 24.x]
                OS: [ubuntu-latest, windows-latest]
                include:
                    - node-version: 18.x
                      OS: macos-latest
                    - node-version: 20.x
                      OS: ubuntu-latest
                      tag: experimental
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                    node-version: ${{ matrix.node-version }}
            - name: Fail if experimental version
              if: matrix.tag == 'experimental'
              run: exit 1
            - name: Perform Tests
              run: |
                echo "Running tests on Node.js version ${{ matrix.node-version }} on OS ${{ matrix.OS }}"
                sleep 10
            - name: Upload test results
              uses: actions/upload-artifact@v4
              with:
                  name: test-results-${{ matrix.node-version }}-${{ matrix.OS }}
                  path: ${{ github.workspace }}
    include-example:
        name: ${{ matrix.colour }} - ${{ matrix.shape }} - ${{ matrix.size }} - ${{ matrix.weight }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                colour: [red, green]
                shape: [square, circle]
                size: [small, medium, large]
                include:
                    - weight: 250g
                    - colour: red
                      shape: circle
                      size: medium
                    - colour: blue
                      shape: circle
                      size: large
        steps:
            - name: Show matrix values
              run: echo "${{ matrix.colour }} - ${{ matrix.shape }} - ${{ matrix.size }} - ${{ matrix.weight }}"