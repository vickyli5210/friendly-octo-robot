name: 13 - Using Caching in Workflows
on:
    workflow_dispatch:
        inputs:
            use-cache:
                type: boolean
                description: 'Whether to cache dependencies'
                default: true
            node-version:
                type: choice
                options:
                    - 18.x
                    - 22.x
                    - 24.x
                description: 'Node.js version to use'
                default: 20.x

jobs:
    # 1. Checkout code from the repository
    # 2. Set up Node.js / install dependencies
    # 3 Linting, formatting, unit testing, building
    # 4. deploy to non-production environment
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 13-caching/react-app
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                    node-version: ${{ inputs.node-version }}
            - name: download cache dependencies
              uses: actions/cache@v3
              if: ${{ inputs.use-cache }}
              id: cache
              with:
                # the step will fail siliently if the cache is not found, so we can check the output to see if it was a hit or miss; also to check the correctness of path directory
                  path: 13-caching/react-app/node_modules
                  key: deps-node-modules-${{hashFiles('13-caching/react-app/package-lock.json')}}
            - name: Install Dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci
            - name: Run Unit Tests
              run: npm run test -- --watchAll=false
            - name: Build
              run: npm run build
            - name: Deploy to Non-Production
              run: |
                 echo "Deploying to non-production environment..."
                 echo "Deployment to non-production completed successfully."
   

