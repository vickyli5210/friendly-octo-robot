name: 16 - Working With Environment
run-name: 16-Working With Environment | Target Environment - ${{ inputs.target-environment }}
on:
    workflow_dispatch:
        # inputs:
        #     target-environment:
        #         type: environment
        #         default: staging
jobs:
    deploy-staging:
        runs-on: ubuntu-latest
        environment: staging environment
        env:
            # we can define environment variables at the job level, and they will be available to all steps within the job; also we can use expressions to set environment variables based on other variables or contexts
            # Note: vars.ENVIRONMENT is read from GitHub vars context (repo/org/environment variable), independent of this job-level env key name.
            JOB_LEVEL_ENVIRONMENT: ${{ vars.MY_ENV_VALUE || 'default' }}
        steps:
            - name: Show target environment
              run: echo "Deploying to staging environment"
    e2e-tests:
        runs-on: ubuntu-latest
        needs: deploy-staging
        steps:
            - name: E2E tests against staging
              run: echo "Running e2e tests against ${{ inputs.target-environment }} environment"
    deploy-front-end-production:
        runs-on: ubuntu-latest
        needs: e2e-tests
        environment: PRO_ENV
        env:
            # we can define environment variables at the job level, and they will be available to all steps within the job; also we can use expressions to set environment variables based on other variables or contexts
            # Note: vars.ENVIRONMENT is read from GitHub vars context (repo/org/environment variable), independent of this job-level env key name.
            JOB_LEVEL_ENVIRONMENT: ${{ vars.MY_ENV_VALUE || 'default' }}
        steps:
            - name: Show target environment
              run: echo "Deploying to front end production environment"

    deploy-backend-production:
        runs-on: ubuntu-latest
        needs: e2e-tests
        environment: PRO_ENV
        env:
            # we can define environment variables at the job level, and they will be available to all steps within the job; also we can use expressions to set environment variables based on other variables or contexts
            # Note: vars.ENVIRONMENT is read from GitHub vars context (repo/org/environment variable), independent of this job-level env key name.
            JOB_LEVEL_ENVIRONMENT: ${{ vars.MY_ENV_VALUE || 'default' }}
        steps:
            - name: Show target environment
              run: echo "Deploying to back end production environment"